<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>One Piece Kvíz</title>
</head>
<body>

    <h1>One Piece Kvíz</h1>

    <form id="quizform">
    
    <h3>1. Ki a főszereplő?</h3>
    <input type="radio" id="zoro" name="elso" value="zoro">
    <label for="zoro">Roronoa Zoro</label> <br>
    <input type="radio"id="luffy" name="elso" value="luffy">
    <label for="luffy">Monkey D. Luffy</label> <br>
    <input type="radio" id="ace" name="elso" value="ace">
    <label for="ace">Portgas D. Ace</label> <br>
    <input type="radio" id="law" name="elso" value="law">
    <label for="law">Trafalgar D. Law</label> <br>
    <div id="visszajelzes1"></div>

    <h3>Mi a neve Luffy kalózcsapatának?</h3>
    <input type="text" id="kalozcsapat" name="masodik" placeholder="Írd ide a választ!">
    <div id="visszajelzes2"></div>

    <h3>3. Ki a navigátor?</h3>
    <input type="radio" id="nami" name="q3" value="nami">
    <label for="nami">Nami</label> <br>
    <input type="radio" id="robin" name="q3" value="robin">
    <label for="robin">Robin</label> <br>
    <div id="visszajelzes3"></div>

    <h3>4. Ki a kalózkirály?</h3>
    <input type="text" id="kalozkiraly" name="negyedik" placeholder="Írd ide a választ!">
    <div id="visszajelzes4"></div>

    <h3>5. Ki a zenész?</h3>
    <input type="radio" id="usopp" name="ötödik" value="usopp">
    <label for="usopp">Usopp</label> <br>
    <input type="radio" id="sanji" name="ötödik" value="sanji">
    <label for="sanji">Sanji</label> <br>
    <input type="radio" id="chopper" name="ötödik" value="chopper">
    <label for="chopper">Tony Tony Chopper</label> <br>
    <input type="radio" id="brook" name="ötödik" value="brook">
    <label for="brook">Brook</label> <br>
    <div id="visszajelzes5"></div>

    <h3>6. Ki a szakács?</h3>
    <input type="radio" id="sanji2" name="hatodik" value="sanji">
    <label for="sanji2">Sanji</label> <br>
    <input type="radio" id="chopper2" name="hatodik" value="chopper">
    <label for="chopper2">Tony Tony Chopper</label> <br>
    <input type="radio" id="usopp2" name="hatodik" value="usopp">
    <label for="usopp2">Usopp</label> <br>
    <input type="radio" id="franky2" name="hatodik" value="franky">
    <label for="franky2">Franky</label> <br>
    <div id="visszajelzes6"></div>

    <h3>7. Melyik Devil Fruit-ot használja Luffy?</h3>
    <input type="text" id="devilfruit" name="hetedik" placeholder="Írd ide a választ!">
    <div id="visszajelzes7"></div>

    <h3>8. Kik a Yonkok tagjai?</h3>
    <input type="checkbox" id="shanks" name="nyolcadik" value="shanks">
    <label for="shanks">Shanks</label> <br>
    <input type="checkbox" id="kaido" name="nyolcadik" value="kaido">
    <label for="kaido">Kaido</label> <br>
    <input type="checkbox" id="garp" name="nyolcadik" value="garp">
    <label for="garp">Monkey D. Garp</label> <br>
    <input type="checkbox" id="blackbeard" name="nyolcadik" value="blackbeard">
    <label for="blackbeard">Blackbeard</label> <br>
    <div id="visszajelzes8"></div>

    <h3>9. Kik uralkodnak a világ felett?</h3>
    <input type="radio" id="marines" name="kilencedik" value="marines">
    <label for="marines">Marines</label> <br>
    <input type="radio" id="worldgovernment" name="kilencedik" value="worldgovernment">
    <label for="worldgovernment">World Government</label> <br>
    <input type="radio" id="revolutionaries" name="kilencedik" value="revolutionaries">
    <label for="revolutionaries">Revolutionaries</label> <br>
    <input type="radio" id="yonko" name="kilencedik" value="yonko">
    <label for="yonko">Yonkos</label> <br>
    <div id="visszajelzes9"></div>

    <h3>10. Ki a vezetőjük?</h3>
    <input type="radio" id="dragon" name="tizedik" value="dragon">
    <label for="dragon">Monkey D. Dragon</label> <br>
    <input type="radio" id="akainu" name="tizedik" value="akainu">
    <label for="akainu">Akainu</label> <br>
    <input type="radio" id="sengoku" name="tizedik" value="sengoku">
    <label for="sengoku">Sengoku</label> <br>
    <input type="radio" id="imu" name="tizedik" value="imu">
    <label for="imu">Imu</label> <br>
    <div id="visszajelzes10"></div>

    <button type="button" onclick="checkQuiz()">Eredmények</button>

    <script src="kviz.js"></script>
</body>
</html>
